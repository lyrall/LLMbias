experiment:
  name: "counterfactual-bias-pipeline"
  seed: 42

model:
  provider: "hf_pipeline"
  model_name: "Meta-Llama-3.1-8B-Instruct"
  model_id: "meta-llama/Meta-Llama-3.1-8B-Instruct"
  model_path: ""
  device_map: "auto"
  torch_dtype: "bfloat16"
  max_new_tokens: 256
  temperature: 0.0

detection:
  sensitivity_threshold: 0.12
  judge_threshold: 0.35
  min_counterfactuals: 1
  weights:
    semantic: 0.30
    stance: 0.25
    toxicity: 0.20
    stereotype: 0.25

correction:
  max_passes: 2
  preserve_weight: 0.5
  fair_weight: 0.3
  edit_cost_weight: 0.2
  confidence_weight: 0.2
  min_priority: 0.15

evaluation:
  lambda_values: [0.3, 0.5, 0.7]
