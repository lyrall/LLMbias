experiment:
  name: "qwen-bbq-age-10"
  seed: 42

model:
  provider: "hf_local"
  model_name: "Qwen"
  model_path: "/home/liuruoyi/models/Qwen2.5-3B-Instruct"
  device_map: "auto"
  torch_dtype: "bfloat16"
  max_new_tokens: 256
  temperature: 0.0

detection:
  sensitivity_threshold: 0.12
  judge_threshold: 0.35
  min_counterfactuals: 1
  semantic_model_path: "/home/liuruoyi/models/all-MiniLM-L6-v2"
  sentiment_model_path: "/home/liuruoyi/models/distilbert-sst2"
  weights:
    semantic: 0.4
    stance: 0.3
    perplexity: 0.3

correction:
  max_passes: 2
  max_candidate_spans: 3
  preserve_weight: 0.5
  fair_weight: 0.3
  edit_cost_weight: 0.2
  confidence_weight: 0.2
  min_priority: 0.15
  min_fairness_gain: 0.02
  accept_threshold: 0.35

evaluation:
  lambda_values: [0.3, 0.5, 0.7]
