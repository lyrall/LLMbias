experiment:
  name: "mock-local-test"
  seed: 42

model:
  provider: "mock"
  model_name: "heuristic-demo"

detection:
  sensitivity_threshold: 0.12
  judge_threshold: 0.25
  min_counterfactuals: 1
  weights:
    semantic: 0.4
    stance: 0.3
    perplexity: 0.3

correction:
  max_passes: 2
  max_candidate_spans: 3
  preserve_weight: 0.5
  fair_weight: 0.3
  edit_cost_weight: 0.2
  confidence_weight: 0.2
  min_priority: 0.15
  min_fairness_gain: 0.02
  accept_threshold: 0.30

evaluation:
  lambda_values: [0.3, 0.5, 0.7]
